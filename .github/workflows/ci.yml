name: CI

# CI order per TESTING_GUIDE.md: typecheck → lint → vitest → build → playwright.
# Playwright runs against a built server with PAYMENT_PROVIDER=mock and is a
# separate job (added in Phase 1). This job runs the four compile-time gates on
# every push and pull request so a red build never reaches main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: typecheck → lint → test → build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./ci.db"
      NODE_ENV: test
      ADMIN_EMAIL: "ci@aioly.test"
      ADMIN_PASSWORD_HASH: "$2a$12$ciplaceholderhashxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      SESSION_SECRET: "ci-session-secret-thirty-two-bytes-minimum"
      PAYMENT_PROVIDER: mock
      EMAIL_PROVIDER: console

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit/integration tests
        run: npm test

      - name: Build
        run: npm run build
